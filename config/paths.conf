# パス設定。data の置き場所。Google Drive運用なら同期フォルダを指す。
PODCAST_ROOT="$HERE/data"

# 文字起こし用の venv（whisperx を入れたもの）。
# 関連ファイルは作業ディレクトリ内に置く方針: プロジェクト直下の venv/ を使う。
# （$HERE = このプロジェクトのルート = config/ の1つ上）
VENV="$HERE/venv"

# Whisper 設定
WHISPER_MODEL="large-v3"
WHISPER_DEVICE="cpu"
WHISPER_COMPUTE="int8"
WHISPER_LANG="ja"

# 長尺の分割文字起こし設定（実行環境のバックグラウンド時間上限を回避するため）。
# 1チャンクの音声長(秒)。実測 壁時計≈18.5+0.470×音声秒 なので、
# 12分(720秒)なら壁≈5.8分で、10分上限に安全に収まる。上限が違う環境は調整。
WHISPER_CHUNK_SEC="720"
# 隣接チャンクのオーバーラップ(秒)。境界の単語欠けを防ぐ。中点で重複排除する。
WHISPER_CHUNK_OVERLAP="6"
