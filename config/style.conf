# 字幕スタイル（一般的なYouTube字幕風: 白文字＋黒縁、下中央、太ゴシック）
# 値を変えて render.py を再実行すれば見た目が変わる。
WIDTH=1920
HEIGHT=1080
BG_COLOR=black
# フォント名。macOSなら "Hiragino Sans"（ヒラギノ角ゴ）。Noto入れたら "Noto Sans CJK JP"
FONT=Hiragino Sans
FONT_SIZE=54
# ASSの色は &HAABBGGRR（A=透明度00が不透明）。白文字＝&H00FFFFFF、黒縁＝&H00000000
PRIMARY_COLOUR=&H00FFFFFF
OUTLINE_COLOUR=&H00000000
# 太さ・縁・影
OUTLINE=3
SHADOW=1
# 配置（2=下中央, 5=中央, 8=上中央）
ALIGNMENT=2
MARGIN_V=70
# 1行の最大文字数（超えたら折り返し）
MAX_CHARS_PER_LINE=24
