# web/nginx/nginx.conf
# このサイト単独で nginx ホストするための最小 nginx.conf（nginx-root 無しでも動く）。
# 本番は nginx-root が conf.d/*.conf を include するが、単独確認・独立運用のときはこれを使う:
#   sudo nginx -c /src/podcast/web/nginx/nginx.conf
#
# nginx-root と同じ土台（mime.types / uwsgi_params）を参照する。単独運用時に nginx-root が
# 無い場合は、この web/nginx/ に mime.types と uwsgi_params を置くか、システムのものを使う。

error_log stderr info;
pid nginx_podcast.pid;
daemon off;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    gzip on;

    # このサイトの server 設定（nginx-root も同じファイルを include する）
    include conf.d/*.conf;
}
