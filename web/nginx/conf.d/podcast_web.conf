# podcast 生成物チェック用サイトの nginx 設定。
# nginx-root が絶対パスで include する。ポート・socket は他サイトと衝突しない値にする。

upstream podcast_web_uwsgi {
    server unix:/tmp/uwsgi_podcast_web.sock;   # このサイト専用 socket
}

server {
    listen 8010;                                # このサイト専用ポート（LB がここへ）
    server_name _;
    charset utf-8;
    client_max_body_size 75M;

    # 動的ページ（IDごとのページ）→ uWSGI
    location / {
        include uwsgi_params;
        uwsgi_pass podcast_web_uwsgi;
    }

    # 生成物（音源・動画）は data/<ID>/contents/ を直接配信（コピーしない）
    location /media/ {
        alias /src/podcast/data/;
        add_header Accept-Ranges bytes;         # 動画シーク対応
    }

    # 会社共通の静的資産（css/js/img/fonts）。base.html 継承で参照する。
    # 必要な範囲だけ web/views/ に置く（less は使わない。CSS は直書き or 最小）。
    location /css/   { alias /src/podcast/web/views/css/; }
    location /js/    { alias /src/podcast/web/views/js/; }
    location /img/   { alias /src/podcast/web/views/img/; }
    location /fonts/ { alias /src/podcast/web/views/fonts/; }
}
