# uwsgi.ini — 生成物チェック用サイトの起動設定（雛形）。
# 実装（app 本体）が来たら module / callable を合わせる。
# 起動: web/venv/bin/uwsgi --ini config/uwsgi.ini
#
# ※ 値は supercom2 の実パス・ユーザーに合わせて調整する。

[uwsgi]
# --- アプリのエントリ（実装が来たら合わせる。例: app.py の app オブジェクト） ---
# module = app:app
chdir = /src/podcast/web

# --- 専用 venv を使う（本体の venv とは別） ---
home = /src/podcast/web/venv

# --- nginx と繋ぐ Unix ソケット（nginx-root の podcast_web.conf と一致させる） ---
socket = /tmp/uwsgi_podcast_web.sock
chmod-socket = 660
vacuum = true

# --- プロセス/スレッド（軽量サイトなので控えめ） ---
master = true
processes = 2
threads = 2

# --- data の場所を環境変数でアプリに渡す（ハードコードしない） ---
# env = SITE_DATA_DIR=/src/podcast/data

die-on-term = true
